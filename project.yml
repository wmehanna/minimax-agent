name: MiniMaxAgent
options:
  bundleIdPrefix: com.minimaxagent
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_BUNDLE_IDENTIFIER: com.minimaxagent.app
    INFOPLIST_FILE: Sources/MiniMaxAgent/Info.plist
    ENABLE_HARDENED_RUNTIME: YES  # Required for distribution
    CODE_SIGN_ENTITLEMENTS: Sources/MiniMaxAgent/MiniMaxAgent.entitlements

targets:
  MiniMaxAgent:
    type: application
    platform: macOS
    sources:
      - path: Sources/MiniMaxAgent
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_NAME: MiniMaxAgent
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: swift-atomics
        product: Atomics
      - package: swift-collections
        product: Collections
      - package: SQLite
        product: SQLite
      - package: PLCrashReporter
        product: CrashReporter
    entitlements:
      path: Sources/MiniMaxAgent/MiniMaxAgent.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true

  MiniMaxAgentTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MiniMaxAgentTests
    dependencies:
      - target: MiniMaxAgent
    settings:
      base:
        PRODUCT_NAME: MiniMaxAgentTests

packages:
  PLCrashReporter:
    url: https://github.com/microsoft/plcrashreporter
    from: "1.11.2"
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: "0.4.0"
  swift-atomics:
    url: https://github.com/apple/swift-atomics
    from: "1.0.0"
  swift-collections:
    url: https://github.com/apple/swift-collections
    from: "1.0.0"
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

schemes:
  MiniMaxAgent:
    build:
      targets:
        MiniMaxAgent: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MiniMaxAgentTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
