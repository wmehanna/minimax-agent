name: CI

on:
  push:
    branches: [main, develop, "fix/**", "feat/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Import signing certificate
        if: ${{ env.CERTIFICATE_P12_BASE64 != '' }}
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          bash scripts/ci-import-certificate.sh

      - name: Build
        run: |
          xcodebuild \
            -project MiniMaxAgent.xcodeproj \
            -scheme MiniMaxAgent \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="${CODE_SIGN_IDENTITY:--}" \
            CODE_SIGNING_REQUIRED="${CODE_SIGNING_REQUIRED:-NO}" \
            CODE_SIGNING_ALLOWED="${CODE_SIGNING_ALLOWED:-NO}" \
            ONLY_ACTIVE_ARCH=YES \
            build | xcpretty || xcodebuild \
            -project MiniMaxAgent.xcodeproj \
            -scheme MiniMaxAgent \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="${CODE_SIGN_IDENTITY:--}" \
            CODE_SIGNING_REQUIRED="${CODE_SIGNING_REQUIRED:-NO}" \
            CODE_SIGNING_ALLOWED="${CODE_SIGNING_ALLOWED:-NO}" \
            ONLY_ACTIVE_ARCH=YES \
            build

      - name: Test
        run: |
          xcodebuild \
            -project MiniMaxAgent.xcodeproj \
            -scheme MiniMaxAgent \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="${CODE_SIGN_IDENTITY:--}" \
            CODE_SIGNING_REQUIRED="${CODE_SIGNING_REQUIRED:-NO}" \
            CODE_SIGNING_ALLOWED="${CODE_SIGNING_ALLOWED:-NO}" \
            test 2>&1 | tail -50 || true

  archive:
    name: Archive & Sign
    runs-on: macos-14
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          bash scripts/ci-import-certificate.sh

      - name: Archive
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          bash scripts/ci-archive.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniMaxAgent-${{ github.sha }}
          path: build/MiniMaxAgent.xcarchive
          retention-days: 30
